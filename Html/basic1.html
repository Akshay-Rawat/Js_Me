<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Ishwar</h1>
    <button>Change me</button>
    <script>
     
     let change = document.querySelector("button")
     change.addEventListener("click",hi)
    
     let heading = document.querySelector("h1")
     function hi(){
        heading.innerText="Akshay"
    }
    </script>
</body>

</html>
