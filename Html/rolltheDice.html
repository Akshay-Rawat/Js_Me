<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    
    Person1: <input type="text" value= "Akshay">
    <button class="roll" id="btn1">Roll the dice</button>
    Value you Got: <span></span> <br> <br>

    Person2: <input type="text" value= "Kanu">
    <button class="roll" id="btn2">Roll the dice</button>
    Value you Got: <span></span> <br> <br>

    Person3: <input type="text" value= "Ayush">
    <button class="roll" id="btn3">Roll the dice</button>
    Value you Got: <span></span> <br> <br>

    Person4: <input type="text" value= "Akshat">
    <button class="roll" id="btn4">Roll the dice</button>
    Value you Got: <span></span> <br> <br>

    Person5: <input type="text" value= "Baaki">
    <button  class="roll" id="btn5">Roll the dice</button>
    Value you Got: <span></span> <br> <br>

    <button id="endBtn"> End Button </button>
    <div id="result" ></div>


    <script>

        let playerNamesInput = document.querySelectorAll("input")
        let rollBtn = document.querySelectorAll(".roll")
        let score_span = document.querySelectorAll("span")

        let endBtn = document.querySelector("#endBtn")
        let resultDiv = document.querySelector("#result")

        // disbale end btn: 
        endBtn.disabled = true


        // roll btns addEventListener
        
        for(let i = 0; i<=rollBtn.length-1; i++){
            rollBtn[i].addEventListener("click", rollTheDice)
        }
        let btnCount = 0
        function rollTheDice(e){
            // console.log(e.target.id)
            btnCount++ 

            if(btnCount == 5){
                 endBtn.disabled = false
            }

            let btnClicked = e.target 
            btnClicked.disabled = true
            let btnClickedIndex = btnClicked.id.slice(3) - 1 // -1 to convert id to index
            // dice roll: 
            let randomValue =  1+parseInt(Math.random()*6)

            score_span[btnClickedIndex].innerText = randomValue

        }


        endBtn.addEventListener("click", calculateResult)

        function calculateResult(){
            // find highest score: 
            let highestScore = 0 
            for(let t of score_span){
                let v = +t.innerText // <span> 6 </span>
                if(v>highestScore){
                  highestScore = v
                }
            }
            // console.log(highestScore)
            let highestScoreNames = []
            for(let i = 0; i<=score_span.length-1; i++){
                 if(highestScore == score_span[i].innerText){ // 2
                    highestScoreNames.push(playerNamesInput[i].value)
                 }
            }


            resultDiv.innerText = `Winner are ${highestScoreNames.join(" , ")}`
            
        }

    </script>
</body>
</html>
