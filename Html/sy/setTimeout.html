<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- <p>Hello my name is akshay</p> -->
    <h1> </h1>
    <script>
        let a = document.querySelector("h1")
        let b = setTimeout(()=>{
            a.innerText="after 3 seconds"
        },3000)
        
        document.addEventListener("click",()=>{
            clearTimeout(b)
            a.innerText = "Timeout"
        })
        
    </script>
</body>
</html>
