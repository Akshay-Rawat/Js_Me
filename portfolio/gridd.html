<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid Fixed</title>

<style>
.container{
    display: grid;
    grid-template-columns: 2fr 4fr 2fr;
    grid-template-rows: 1fr 3fr 2fr 1fr;
    gap: 20px;
    height: 700em;
}

.container div{
    background: lightcoral;
}

.box1{
    grid-row: 1 / 2;
    grid-column: 1 / 4;
}

.box2{
    grid-row: 2/3;
    grid-column: 1/2;
}

.box3{
    grid-row: 3/4;
    grid-column: 1/2;
}

.box4{
    grid-row: 4 / 5;
    grid-column: 1 / 4;
}

.box5{
    grid-row: 2/4;
    grid-column: 2 / 3;
}

.box6{
    grid-row: 2/4;
    grid-column: 3 / 4;
}
</style>
</head>

<body>
<div class="container">
    <div class="box1">Box 1</div>
    <div class="box2">Box 2</div>
    <div class="box3">Box 3</div>
    <div class="box4">Box 4</div>
    <div class="box5">Box 5</div>
    <div class="box6">Box 6</div>
</div>
</body>
</html>
